<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mangalore Rentals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #2b7cff;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .price {
      color: green;
      font-weight: bold;
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #2b7cff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .post-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff5722;
      color: white;
      padding: 12px 16px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  🏠 Mangalore Rentals
</header>

<div class="container">

  <!-- Listing 1 -->
  <div class="card">
    <p><b>📍 Bejai</b></p>
    <p class="price">₹8000 / month</p>
    <p>1BHK available, semi furnished</p>
    <a href="tel:9876543210" class="btn">📞 Call</a>
  </div>

  <!-- Listing 2 -->
  <div class="card">
    <p><b>📍 Kankanady</b></p>
    <p class="price">₹12000 / month</p>
    <p>2BHK, family preferred</p>
    <a href="tel:9876543211" class="btn">📞 Call</a>
  </div>

  <!-- Listing 3 -->
  <div class="card">
    <p><b>📍 Surathkal</b></p>
    <p class="price">₹5000 / month</p>
    <p>Single room for students</p>
    <a href="tel:9876543212" class="btn">📞 Call</a>
  </div>

</div>

<!-- Post Listing Button -->
<a href="https://wa.me/919876543210" class="post-btn">
  + Post Listing
</a>

</body>
</html>
